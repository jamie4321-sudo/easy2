<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스낵앤가든 · 쉬운 글 변환</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --yellow: #FFE600;
    --black:  #1A1A1A;
    --white:  #FFFFFF;
    --gray:   #F5F5F5;
    --gray2:  #E8E8E8;
    --muted:  #888;
    --radius: 16px;
    --radius-sm: 10px;
    --radius-pill: 40px;
  }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--gray);
    color: var(--black);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }
  nav {
    width: 100%; max-width: 480px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .nav-logo { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700; }
  .nav-dot { width: 8px; height: 8px; background: var(--yellow); border-radius: 50%; animation: blink 1.5s ease infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
  .nav-badge { background: var(--black); color: var(--yellow); font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: var(--radius-pill); }

  .card { width: 100%; max-width: 480px; background: var(--white); border-radius: var(--radius); overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,.08); }

  .banner { background: var(--yellow); padding: 20px; position: relative; overflow: hidden; }
  .banner::after { content: '✦'; position: absolute; right: 20px; top: 14px; font-size: 32px; opacity: .15; }
  .banner-tag { display: inline-block; background: var(--black); color: var(--yellow); font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: var(--radius-pill); margin-bottom: 10px; letter-spacing: .05em; }
  .banner-title { font-size: 20px; font-weight: 700; color: var(--black); line-height: 1.3; }
  .banner-sub { font-size: 12px; color: rgba(0,0,0,.5); margin-top: 5px; }

  .body { padding: 20px; }
  .section { margin-bottom: 18px; }
  .lbl { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .08em; margin-bottom: 9px; }

  .chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip { padding: 6px 14px; border-radius: var(--radius-pill); font-size: 13px; font-family: inherit; border: 1.5px solid var(--gray2); color: var(--muted); cursor: pointer; background: var(--white); transition: all .15s; }
  .chip.on { background: var(--black); color: var(--yellow); border-color: var(--black); font-weight: 700; }

  .ex-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
  .ex-btn { padding: 10px 12px; border: 1.5px solid var(--gray2); border-radius: var(--radius-sm); background: var(--gray); color: #555; cursor: pointer; font-size: 12px; font-family: inherit; text-align: left; line-height: 1.5; transition: all .15s; }
  .ex-btn:hover { border-color: var(--black); background: var(--white); color: var(--black); }

  .input-wrap { background: var(--gray); border: 1.5px solid var(--gray2); border-radius: var(--radius-sm); padding: 12px; transition: border-color .15s; }
  .input-wrap:focus-within { border-color: var(--black); background: var(--white); }
  textarea { width: 100%; min-height: 100px; font-size: 14px; line-height: 1.75; border: none; background: transparent; color: var(--black); resize: none; font-family: inherit; outline: none; }
  textarea::placeholder { color: #BDBDBD; }

  .send-btn { width: 100%; padding: 14px; font-size: 15px; font-weight: 700; font-family: inherit; background: var(--black); color: var(--yellow); border: none; border-radius: var(--radius-pill); cursor: pointer; margin-top: 10px; transition: opacity .15s, transform .1s; }
  .send-btn:hover { opacity: .88; }
  .send-btn:active { transform: scale(.98); }
  .send-btn:disabled { opacity: .35; cursor: not-allowed; }

  .loading { display: none; text-align: center; padding: 16px 0 4px; font-size: 13px; color: var(--muted); }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--gray2); border-top-color: var(--black); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .err-box { display: none; margin-top: 12px; background: #FFF0F0; border: 1.5px solid #F5C4B3; border-radius: var(--radius-sm); padding: 12px; font-size: 13px; color: #993C1D; line-height: 1.6; }

  .result-box { display: none; margin-top: 14px; background: var(--yellow); border-radius: var(--radius-sm); padding: 16px; animation: fadeUp .3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .result-label { font-size: 11px; font-weight: 700; color: rgba(0,0,0,.45); letter-spacing: .06em; margin-bottom: 10px; }
  .result-text { font-size: 15px; line-height: 1.9; color: var(--black); white-space: pre-wrap; }
  .result-actions { display: flex; gap: 8px; margin-top: 14px; }
  .result-actions button { flex: 1; padding: 9px; font-size: 13px; font-family: inherit; border: 1.5px solid rgba(0,0,0,.18); border-radius: var(--radius-pill); background: rgba(0,0,0,.06); color: var(--black); cursor: pointer; font-weight: 500; transition: background .15s; }
  .result-actions button:hover { background: rgba(0,0,0,.13); }

  /* API 키 설정 모달 */
  .setup-overlay { display: flex; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .setup-modal { background: var(--white); border-radius: var(--radius); padding: 28px 24px; width: 100%; max-width: 400px; }
  .setup-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .setup-sub { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }
  .setup-input { width: 100%; padding: 12px; border: 1.5px solid var(--gray2); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; outline: none; color: var(--black); }
  .setup-input:focus { border-color: var(--black); }
  .setup-btn { width: 100%; padding: 13px; font-size: 14px; font-weight: 700; font-family: inherit; background: var(--black); color: var(--yellow); border: none; border-radius: var(--radius-pill); cursor: pointer; margin-top: 12px; }
  .setup-link { display: block; text-align: center; font-size: 12px; color: var(--muted); margin-top: 10px; text-decoration: none; }
  .setup-link:hover { color: var(--black); }
  .key-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .key-info { font-size: 12px; color: var(--muted); }
  .key-reset { font-size: 12px; color: var(--muted); cursor: pointer; text-decoration: underline; background: none; border: none; font-family: inherit; }

  footer { margin-top: 20px; font-size: 11px; color: #BDBDBD; text-align: center; }

  @media (prefers-color-scheme: dark) {
    body { background: #111; }
    .card { background: #1E1E1E; box-shadow: 0 2px 12px rgba(0,0,0,.4); }
    .body { background: #1E1E1E; }
    .lbl { color: rgba(255,255,255,.4); }
    .chip { background: #2A2A2A; border-color: #333; color: rgba(255,255,255,.5); }
    .chip.on { background: var(--yellow); color: var(--black); border-color: var(--yellow); }
    .ex-btn { background: #2A2A2A; border-color: #333; color: rgba(255,255,255,.6); }
    .ex-btn:hover { border-color: var(--yellow); color: var(--yellow); background: #2A2A2A; }
    .input-wrap { background: #2A2A2A; border-color: #333; }
    .input-wrap:focus-within { border-color: var(--yellow); background: #2A2A2A; }
    textarea { color: #fff; }
    textarea::placeholder { color: rgba(255,255,255,.25); }
    .send-btn { background: var(--yellow); color: var(--black); }
    .spinner { border-color: #333; border-top-color: var(--yellow); }
    .loading { color: rgba(255,255,255,.4); }
    .err-box { background: rgba(240,149,149,.1); border-color: rgba(240,149,149,.25); color: #f09595; }
    .setup-modal { background: #1E1E1E; color: #fff; }
    .setup-input { background: #2A2A2A; border-color: #333; color: #fff; }
    .setup-input:focus { border-color: var(--yellow); }
    footer { color: rgba(255,255,255,.2); }
    .key-info, .key-reset { color: rgba(255,255,255,.4); }
    .key-reset:hover { color: #fff; }
  }
</style>
</head>
<body>

<!-- API 키 설정 모달 -->
<div class="setup-overlay" id="setupOverlay">
  <div class="setup-modal">
    <div class="setup-title">🔑 API 키 설정</div>
    <div class="setup-sub">
      Anthropic API 키를 입력하면 웹에서 바로 쉬운 글로 변환할 수 있어요.<br>
      키는 이 기기에만 저장되고 외부로 전송되지 않아요.
    </div>
    <input class="setup-input" id="apiKeyInput" type="text" placeholder="API 키를 여기에 붙여넣으세요" onkeydown="if(event.key==='Enter') saveKey()" />
    <button class="setup-btn" onclick="saveKey()">저장하고 시작하기</button>
    <a class="setup-link" href="https://console.anthropic.com/settings/keys" target="_blank">
      → Anthropic API 키 발급받기 (무료 크레딧 제공)
    </a>
  </div>
</div>

<nav>
  <div class="nav-logo"><div class="nav-dot"></div>스낵앤가든</div>
  <span class="nav-badge">쉬운 글 변환</span>
</nav>

<div class="card">
  <div class="banner">
    <div class="banner-tag">스낵앤가든사업팀 전용</div>
    <div class="banner-title">어려운 말을<br>쉽게 바꿔드려요</div>
    <div class="banner-sub">발달장애인 동료들과의 소통을 도와드립니다</div>
  </div>

  <div class="body">
    <div class="section">
      <div class="key-row">
        <div class="lbl" style="margin-bottom:0;">상황 선택</div>
        <button class="key-reset" onclick="resetKey()">🔑 API 키 변경</button>
      </div>
      <div class="chips" style="margin-top:9px;">
        <button class="chip on" data-ctx="업무 지시">업무 지시</button>
        <button class="chip" data-ctx="안전 수칙">안전 수칙</button>
        <button class="chip" data-ctx="공지 사항">공지 사항</button>
        <button class="chip" data-ctx="칭찬·피드백">칭찬·피드백</button>
        <button class="chip" data-ctx="일정·약속">일정·약속</button>
      </div>
    </div>

    <div class="section">
      <div class="lbl">예시 문장 불러오기</div>
      <div class="ex-grid">
        <button class="ex-btn" data-ex="금일 오후 2시까지 납품 물량 포장 작업을 완료하여 주시기 바랍니다.">📦 납품 마감</button>
        <button class="ex-btn" data-ex="작업 전 반드시 보호장갑 및 안전화를 착용하여야 합니다.">🧤 안전 장비</button>
        <button class="ex-btn" data-ex="금일 석식 급여는 개인 사유로 인한 조기 퇴근 시 제공되지 않습니다.">🍱 식사 안내</button>
        <button class="ex-btn" data-ex="금주 목요일은 정기 안전교육 실시로 인해 30분 조기 퇴근합니다.">📅 일정 변경</button>
      </div>
    </div>

    <div class="section">
      <div class="lbl">바꿀 내용 입력</div>
      <div class="input-wrap">
        <textarea id="inp" placeholder="어려운 글을 여기에 입력하세요"></textarea>
      </div>
      <button class="send-btn" id="btn" onclick="convert()">쉬운 글로 바꾸기 ✦</button>
    </div>

    <div class="loading" id="loading">
      <span class="spinner"></span>바꾸는 중이에요...
    </div>
    <div class="err-box" id="err"></div>

    <div class="result-box" id="result">
      <div class="result-label">✓ 쉬운 글로 바뀐 내용</div>
      <div class="result-text" id="result-text"></div>
      <div class="result-actions">
        <button onclick="doCopy()">📋 복사하기</button>
        <button onclick="doClear()">↺ 다시 하기</button>
      </div>
    </div>
  </div>
</div>

<footer>스낵앤가든사업팀 · 링키지랩 © 2026</footer>

<script>
  const STORAGE_KEY = 'sg_api_key';
  let ctx = '업무 지시';

  function init() {
    const key = localStorage.getItem(STORAGE_KEY);
    if (key) {
      document.getElementById('setupOverlay').style.display = 'none';
    }
  }

  function saveKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key) {
      alert('API 키를 입력해주세요.');
      return;
    }
    localStorage.setItem(STORAGE_KEY, key);
    document.getElementById('setupOverlay').style.display = 'none';
  }

  function resetKey() {
    localStorage.removeItem(STORAGE_KEY);
    document.getElementById('apiKeyInput').value = '';
    document.getElementById('setupOverlay').style.display = 'flex';
  }

  document.querySelectorAll('.chip').forEach(c => {
    c.onclick = () => {
      document.querySelectorAll('.chip').forEach(x => x.classList.remove('on'));
      c.classList.add('on');
      ctx = c.dataset.ctx;
    };
  });

  document.querySelectorAll('.ex-btn').forEach(b => {
    b.onclick = () => { document.getElementById('inp').value = b.dataset.ex; };
  });

  async function convert() {
    const text = document.getElementById('inp').value.trim();
    if (!text) return;

    const apiKey = localStorage.getItem(STORAGE_KEY);
    if (!apiKey) { resetKey(); return; }

    const btn = document.getElementById('btn');
    const loading = document.getElementById('loading');
    const result = document.getElementById('result');
    const err = document.getElementById('err');

    btn.disabled = true;
    loading.style.display = 'block';
    result.style.display = 'none';
    err.style.display = 'none';

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1024,
          system: `당신은 스낵앤가든사업팀(장애인 표준사업장) 소통 도우미입니다.
규칙:
1. 문장은 짧게 — 한 문장에 한 가지 내용만
2. 어려운 한자어·외래어는 쉬운 우리말로
3. 숫자·시간·날짜는 구체적으로
4. 중요한 내용을 앞에
5. 어려운 단어는 (괄호)로 설명 추가
6. 친근한 존댓말 사용
7. 결과만 출력 — 설명·부연 없이`,
          messages: [{
            role: 'user',
            content: `상황: ${ctx}\n\n다음 글을 쉬운 글로 바꿔주세요:\n\n${text}`
          }]
        })
      });

      if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        throw new Error(e?.error?.message || `오류 코드: ${res.status}`);
      }

      const data = await res.json();
      const out = data?.content?.[0]?.text;
      if (!out) throw new Error('응답이 비어 있어요.');

      document.getElementById('result-text').textContent = out.trim();
      result.style.display = 'block';

    } catch (e) {
      err.innerHTML = `오류가 발생했어요: ${e.message}<br><small style="opacity:.7">API 키를 확인하거나 다시 시도해보세요.</small>`;
      err.style.display = 'block';
    }

    loading.style.display = 'none';
    btn.disabled = false;
  }

  function doCopy() {
    const t = document.getElementById('result-text').textContent;
    navigator.clipboard.writeText(t).then(() => {
      const b = document.querySelector('.result-actions button');
      const orig = b.textContent;
      b.textContent = '✓ 복사됐어요!';
      setTimeout(() => { b.textContent = orig; }, 1500);
    });
  }

  function doClear() {
    document.getElementById('inp').value = '';
    document.getElementById('result').style.display = 'none';
    document.getElementById('err').style.display = 'none';
  }

  init();
</script>
</body>
</html>
